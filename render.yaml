services:
  - type: web
    name: mms-api
    env: node
    autoDeploy: true
    healthCheckPath: /health
    buildCommand: npm ci
    startCommand: npm run start:api
    envVars:
      - key: NODE_VERSION
        value: 22.21.1
      - key: APP_ENV
        value: production
      - key: APP_URL
        sync: false
      - key: API_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: MIGRATION_DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"
      - key: MMS_AUTO_MIGRATE
        value: "false"
      - key: MMS_SEED_ON_BOOT
        value: "false"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: mms-uploads
      - key: AFRICAS_TALKING_USERNAME
        sync: false
      - key: AFRICAS_TALKING_API_KEY
        sync: false
      - key: AFRICAS_TALKING_FROM
        sync: false
      - key: AFRICAS_TALKING_USE_SANDBOX
        value: "false"
      - key: FLUTTERWAVE_SECRET_KEY
        sync: false
      - key: FLUTTERWAVE_PUBLIC_KEY
        sync: false
      - key: FLUTTERWAVE_WEBHOOK_SECRET
        sync: false
      - key: PAYMENTS_ENABLED
        value: "true"
