version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: mms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mms
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mms-network

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: mms-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mms-network

  # Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: mms-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      API_PORT: 3001
      APP_ENV: production
      APP_NAME: MMS
      APP_URL: http://localhost:8080,http://localhost:5173
      API_URL: http://localhost:3001
      VITE_API_BASE_URL: http://localhost:3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mms
      MIGRATION_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mms
      DATABASE_SSL: "false"
      MMS_AUTO_MIGRATE: "true"
      MMS_SEED_ON_BOOT: "true"
      REDIS_URL: redis://redis:6379
      SESSION_TTL_HOURS: 24
      OTP_TTL_MINUTES: 10
      PAYMENTS_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - mms-network
    volumes:
      - ./runtime:/app/runtime

  # Frontend (for development)
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: mms-web
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: http://localhost:3001
    command: npm run dev:web
    depends_on:
      - api
    networks:
      - mms-network

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: mms-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - mms-network

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: mms-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./infra/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - mms-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  mms-network:
    driver: bridge
